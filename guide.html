<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">

<title>מדריך למתחילים ל-Claude Code · PDF לאישור · vaknin.ai</title>
<style>
  :root{ --bg:#F2EEE6; --ink:#111111; --soft:#555049; --accent:#2C49F5; }
  *{ box-sizing:border-box; -webkit-text-size-adjust:100%; }
  body{ margin:0; background:var(--bg); color:var(--ink);
    font-family:-apple-system,"Heebo",system-ui,Arial,sans-serif; }
  .wrap{ max-width:680px; margin:0 auto; padding:22px 14px 64px; }
  header{ text-align:center; padding:14px 6px 18px; }
  header .wm{ font-weight:800; font-size:20px; direction:ltr; }
  header .wm .ai{ border-bottom:3px solid var(--accent); }
  header h1{ font-size:21px; font-weight:800; margin:12px 0 4px; line-height:1.35; }
  header p{ font-size:14px; color:var(--soft); margin:0; }
  .dl{ display:inline-block; margin:14px auto 4px; background:var(--accent); color:#fff;
    font-weight:800; font-size:16px; text-decoration:none; padding:13px 26px; border-radius:10px;
    box-shadow:5px 5px 0 0 var(--ink); }
  figure{ margin:0 0 16px; }
  figure img{ width:100%; height:auto; display:block; border-radius:10px;
    border:1px solid rgba(17,17,17,.14); box-shadow:0 6px 22px rgba(17,17,17,.12); }
  .num{ font-size:12px; color:var(--soft); margin:0 4px 6px; font-weight:700; direction:ltr; text-align:left; }
  footer{ text-align:center; color:var(--soft); font-size:13px; padding-top:18px; }
</style>
</head>
<body>
  <div class="wrap">

    <figure><div class="num">עמ' 7 / 8 · תבנית CLAUDE.md + Checklist</div><img src="guide-7.png" alt="עמוד 7"></figure>

    <footer>vaknin.ai · מדריך למתחילים ל-Claude Code (תצוגה לאישור)</footer>
