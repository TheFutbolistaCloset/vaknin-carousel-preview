<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>vaknin.ai · קרוסלה לאישור — 5 הטעויות ב-Claude Code</title>
<style>
  :root{ --bg:#F2EEE6; --ink:#111111; --soft:#555049; --accent:#2C49F5; }
  *{ box-sizing:border-box; -webkit-text-size-adjust:100%; }
  body{ margin:0; background:var(--bg); color:var(--ink);
    font-family:-apple-system,"Heebo","Rubik",system-ui,Arial,sans-serif; }
  .wrap{ max-width:560px; margin:0 auto; padding:22px 16px 64px; }
  header{ text-align:center; padding:14px 6px 22px; }
  header .wm{ font-weight:800; font-size:20px; letter-spacing:-0.01em; direction:ltr; }
  header .wm .ai{ border-bottom:3px solid var(--accent); }
  header h1{ font-size:21px; font-weight:800; margin:12px 0 4px; line-height:1.35; }
  header p{ font-size:14px; color:var(--soft); margin:0; }
  figure{ margin:0 0 18px; }
  figure img{ width:100%; height:auto; display:block; border-radius:14px;
    border:1px solid rgba(17,17,17,.12); box-shadow:0 6px 22px rgba(17,17,17,.10); }
  .num{ font-size:12px; color:var(--soft); margin:0 4px 6px; font-weight:700; direction:ltr; text-align:left; }
  footer{ text-align:center; color:var(--soft); font-size:13px; padding-top:18px; line-height:1.6; }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="wm">vaknin<span class="ai">.ai</span></div>
      <h1>5 הטעויות שעולות למתחילים ב-Claude Code</h1>
      <p>תצוגה לאישור · גוללים למטה לכל 8 השקופיות</p>
    </header>

    <figure><div class="num">01 / 08 · שער</div><img src="slide-1.png" alt="שקופית 1"></figure>
    <figure><div class="num">02 / 08 · התקנה</div><img src="slide-2.png" alt="שקופית 2"></figure>
    <figure><div class="num">03 / 08 · טעות 1</div><img src="slide-3.png" alt="שקופית 3"></figure>
    <figure><div class="num">04 / 08 · טעות 2</div><img src="slide-4.png" alt="שקופית 4"></figure>
    <figure><div class="num">05 / 08 · טעות 3</div><img src="slide-5.png" alt="שקופית 5"></figure>
    <figure><div class="num">06 / 08 · טעות 4</div><img src="slide-6.png" alt="שקופית 6"></figure>
    <figure><div class="num">07 / 08 · טעות 5</div><img src="slide-7.png" alt="שקופית 7"></figure>
    <figure><div class="num">08 / 08 · CTA</div><img src="slide-8.png" alt="שקופית 8"></figure>

    <footer>vaknin.ai · תצוגה פנימית לאישור קופי + ויז'ואל</footer>
  </div>
</body>
</html>
